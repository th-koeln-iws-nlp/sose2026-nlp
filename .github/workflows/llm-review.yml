name: LLM Code Review

on:
  issues:
    types: [closed]

permissions:
  issues: write
  contents: read

jobs:
  review:
    # Only run if the issue has the 'assignment' label
    if: contains(github.event.issue.labels.*.name, 'assignment')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout student repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-genai marimo requests

      - name: Extract assignment number from issue title
        id: parse
        run: |
          # Expects issue titles like "Assignment 04: Build a document search with TF-IDF"
          SESSION=$(echo "${{ github.event.issue.title }}" | grep -oP 'Assignment \K[0-9]+' | sed 's/^0*//')
          PADDED=$(printf "%02d" "$SESSION")
          echo "session=$PADDED" >> "$GITHUB_OUTPUT"
          echo "Detected session: $PADDED"

      - name: Gather student code
        id: gather
        run: |
          SESSION_DIR="assignments/${{ steps.parse.outputs.session }}_assignment"
          if [ ! -d "$SESSION_DIR" ]; then
            echo "::error::Directory $SESSION_DIR not found"
            exit 1
          fi

          CODE=""
          for f in $(find "$SESSION_DIR" -name "*.py" -type f | sort); do
            CODE="$CODE
          --- FILE: $f ---
          $(cat "$f")
          "
          done

          echo "$CODE" > /tmp/student_code.txt
          echo "session_dir=$SESSION_DIR" >> "$GITHUB_OUTPUT"

      - name: Fetch prompts and session content from Course Hub
        env:
          COURSE_HUB_URL: ${{ secrets.COURSE_HUB_URL }}
          COURSE_HUB_API_TOKEN: ${{ secrets.COURSE_HUB_API_TOKEN }}
        run: |
          SESSION="${{ steps.parse.outputs.session }}"
          AUTH="Authorization: Bearer $COURSE_HUB_API_TOKEN"

          # Fetch review system prompt
          HTTP=$(curl -s -o /tmp/prompt_response.json -w "%{http_code}" \
            -H "$AUTH" "$COURSE_HUB_URL/api/content/prompt/review_system_prompt")
          if [ "$HTTP" != "200" ]; then
            echo "::error::Could not fetch review_system_prompt from Course Hub (HTTP $HTTP)"
            exit 1
          fi
          python3 -c "import json; print(json.load(open('/tmp/prompt_response.json'))['content'])" \
            > /tmp/system_prompt.md

          # Fetch session content (template code + review addendum)
          HTTP=$(curl -s -o /tmp/session_response.json -w "%{http_code}" \
            -H "$AUTH" "$COURSE_HUB_URL/api/content/lecture/$SESSION")
          if [ "$HTTP" = "200" ]; then
            python3 - <<'PY'
          import json
          data = json.load(open("/tmp/session_response.json"))
          open("/tmp/template_code.txt", "w").write(data.get("template_code") or "")
          open("/tmp/review_addendum.txt", "w").write(data.get("review_addendum") or "")
          PY
            echo "Loaded session content for session $SESSION"
          else
            echo "No session content for session $SESSION — proceeding without template/addendum"
            echo "" > /tmp/template_code.txt
            echo "" > /tmp/review_addendum.txt
          fi

          # Append review addendum to system prompt if present
          if [ -s /tmp/review_addendum.txt ]; then
            echo "" >> /tmp/system_prompt.md
            echo "---" >> /tmp/system_prompt.md
            echo "" >> /tmp/system_prompt.md
            echo "## Additional criteria for this session" >> /tmp/system_prompt.md
            echo "" >> /tmp/system_prompt.md
            cat /tmp/review_addendum.txt >> /tmp/system_prompt.md
            echo "Appended session review addendum"
          fi

      # ── marimo check ──────────────────────────────────────────────
      - name: Run marimo check
        id: marimo_check
        continue-on-error: true
        run: |
          SESSION_DIR="assignments/${{ steps.parse.outputs.session }}_assignment"
          RESULT=""
          HAS_ISSUES=false

          for f in $(find "$SESSION_DIR" -name "*.py" -type f | sort); do
            echo "Checking $f ..."
            OUTPUT=$(marimo check "$f" 2>&1) || HAS_ISSUES=true
            if echo "$OUTPUT" | grep -qiE "warning|error|Found [1-9]"; then
              HAS_ISSUES=true
            fi
            RESULT="$RESULT
          ### \`$f\`
          \`\`\`
          $OUTPUT
          \`\`\`
          "
          done

          {
            echo "## 🔍 marimo check"
            echo ""
            if [ "$HAS_ISSUES" = true ]; then
              echo "Some notebooks have issues ⚠️"
            else
              echo "All notebooks passed ✅"
            fi
            echo ""
            echo "$RESULT"
          } > /tmp/marimo_check.md

      - name: Post marimo check as issue comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body-file /tmp/marimo_check.md

      # ── LLM feedback ──────────────────────────────────────────────
      - name: Fetch previous review comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            --paginate \
            --jq '.[] | select(.body | startswith("## 🤖 LLM Code Review")) | .body' \
            > /tmp/previous_reviews.txt || true

          if [ -s /tmp/previous_reviews.txt ]; then
            echo "Found previous reviews"
          else
            echo "No previous reviews found (first submission)"
            echo "" > /tmp/previous_reviews.txt
          fi

      - name: Get LLM feedback
        id: feedback
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          from google import genai

          api_key = os.environ["GEMINI_API_KEY"]
          client = genai.Client(vertexai=True, api_key=api_key)

          with open("/tmp/student_code.txt") as f:
              student_code = f.read()
          with open("/tmp/system_prompt.md") as f:
              system_prompt = f.read()
          with open("/tmp/previous_reviews.txt") as f:
              previous_reviews = f.read().strip()
          with open("/tmp/template_code.txt") as f:
              template_code = f.read().strip()

          issue_body = os.environ.get("ISSUE_BODY", "No assignment description available.")

          user_prompt = f"Here is the assignment description:\n\n{issue_body}"

          if template_code:
              user_prompt += f"""

          Here is the starter template I provided to the students. This is
          MY code, not theirs. Do NOT review or comment on this code. Only
          review code the students wrote or modified beyond this template:

          {template_code}"""

          user_prompt += f"""

          Here is the student submission (which started from the template above):

          {student_code}"""

          if previous_reviews:
              user_prompt += f"""

          Here are your previous reviews of this assignment:

          {previous_reviews}

          The students have reworked their code based on your feedback.
          Please review the updated code. Acknowledge improvements you
          suggested that were implemented. Focus new comments on remaining
          issues or new problems. Do not repeat feedback that has been addressed."""
          else:
              user_prompt += "\n\nPlease review this code."

          response = client.models.generate_content(
              model="gemini-2.5-flash",
              contents=user_prompt,
              config=genai.types.GenerateContentConfig(
                  system_instruction=system_prompt,
                  temperature=0.3,
                  max_output_tokens=4096,
              ),
          )

          feedback_text = response.text
          review_round = previous_reviews.count("## 🤖 LLM Code Review") + 1

          with open("/tmp/feedback.md", "w") as f:
              if review_round > 1:
                  f.write(f"## 🤖 LLM Code Review (Round {review_round})\n\n")
              else:
                  f.write("## 🤖 LLM Code Review\n\n")
              f.write(feedback_text)
              f.write("\n\n---\n*Automated review powered by Gemini. ")
              f.write("This is feedback, not a grade. Discuss with your team and your instructor.*")

          PYTHON_SCRIPT

      - name: Post feedback as issue comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body-file /tmp/feedback.md

      # ── Quiz generation ───────────────────────────────────────────
      - name: Generate and upload personalized quiz
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COURSE_HUB_URL: ${{ secrets.COURSE_HUB_URL }}
          COURSE_HUB_API_TOKEN: ${{ secrets.COURSE_HUB_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/generate_quiz.py \
            --repo-owner "${{ github.repository_owner }}" \
            --repo-name  "${{ github.event.repository.name }}" \
            --issue-number "${{ github.event.issue.number }}" \
            --session-number "${{ steps.parse.outputs.session }}"
